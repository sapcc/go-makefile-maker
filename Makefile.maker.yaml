# Configuration file for <https://github.com/sapcc/go-makefile-maker>

metadata:
  url: https://github.com/sapcc/go-makefile-maker

binaries:
  - name:        go-makefile-maker
    fromPackage: .
    installTo:   bin/

golang:
  autoupdateDependencies:
    enabled: true
    matchModule: ^github.com/(?:sapcc|sap-cloud-infrastructure)/
  setGoModVersion: true

golangciLint:
  createConfig: true
  reviveRules:
    - name: exported
      arguments:
        - checkPrivateReceivers
        - disableChecksOnConstants

githubWorkflow:
  ci:
    enabled: true
  global:
    defaultBranch: main # only defined here so that the "Run go-makefile-maker" Action knows it

nix:
  extraPackages:
    - renovate

renovate:
  enabled: true
  assignees:
    - SuperSandro2000
  customManagers:
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - 'DefaultAlpineImage\s+=\s+"(?<currentValue>[^"]+)"'
      depNameTemplate: alpine
      datasourceTemplate: docker
      versioningTemplate: docker
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - 'DefaultGoVersion\s+=\s+"(?<currentValue>[^"]+)"'
      depNameTemplate: go
      datasourceTemplate: golang-version
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - 'DefaultPostgresVersion\s+=\s+"(?<currentValue>[^"]+)"'
      depNameTemplate: postgres
      datasourceTemplate: docker
      versioningTemplate: docker
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - 'DefaultLinkerdAwaitVersion\s+=\s+"(?<currentValue>[^"]+)"'
      depNameTemplate: linkerd/linkerd-await
      datasourceTemplate: github-releases
      versioningTemplate: semver
      extractVersionTemplate: ^release/v(?<version>.*)$
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - '"actions/upload-artifact@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
      depNameTemplate: actions/upload-artifact
      datasourceTemplate: github-releases
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - '"github/codeql-action/init@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
      depNameTemplate: github/codeql-action
      datasourceTemplate: github-releases
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - '"github/codeql-action/analyze@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
      depNameTemplate: github/codeql-action
      datasourceTemplate: github-releases
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - '"github/codeql-action/autobuild@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
      depNameTemplate: github/codeql-action
      datasourceTemplate: github-releases
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - '"actions/checkout@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
      depNameTemplate: actions/checkout
      datasourceTemplate: github-releases
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - '"actions/setup-go@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
      depNameTemplate: actions/setup-go
