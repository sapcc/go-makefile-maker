# Configuration file for <https://github.com/sapcc/go-makefile-maker>

metadata:
  url: https://github.com/sapcc/go-makefile-maker

binaries:
  - name:        go-makefile-maker
    fromPackage: .
    installTo:   bin/

golang:
  autoupdateDependencies:
    enabled: true
    matchModule: ^github.com/(?:sapcc|sap-cloud-infrastructure)/
  setGoModVersion: true

golangciLint:
  createConfig: true
  reviveRules:
    - name: exported
      arguments:
        - checkPrivateReceivers
        - disableChecksOnConstants

githubWorkflow:
  ci:
    enabled: true
  global:
    defaultBranch: main # only defined here so that the "Run go-makefile-maker" Action knows it

nix:
  extraPackages:
    - renovate

renovate:
  enabled: true
  assignees:
    - SuperSandro2000
  customManagers:
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - 'DefaultAlpineImage\s+=\s+"(?<currentValue>[^"]+)"'
      depNameTemplate: alpine
      datasourceTemplate: docker
      versioningTemplate: docker
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - 'DefaultGoVersion\s+=\s+"(?<currentValue>[^"]+)"'
      depNameTemplate: go
      datasourceTemplate: golang-version
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - 'DefaultPostgresVersion\s+=\s+"(?<currentValue>[^"]+)"'
      depNameTemplate: postgres
      datasourceTemplate: docker
      versioningTemplate: docker
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - 'DefaultLinkerdAwaitVersion\s+=\s+"(?<currentValue>[^"]+)"'
      depNameTemplate: linkerd/linkerd-await
      datasourceTemplate: github-releases
      versioningTemplate: semver
      extractVersionTemplate: ^release/v(?<version>.*)$

reuse:
  annotations:
    - paths:
        - internal/makefile/license-scan-overrides.jsonl.tmpl
        - internal/makefile/license-scan-rules.json
        - internal/reuse/go-licence-detector.tmpl
        - logo*.png
      SPDX-FileCopyrightText: 'SAP SE or an SAP affiliate company'
      SPDX-License-Identifier: Apache-2.0

verbatim: |
  run: build/go-makefile-maker
    ./build/go-makefile-maker
