# Configuration file for <https://github.com/sapcc/go-makefile-maker>

metadata:
  url: https://github.com/sapcc/go-makefile-maker

binaries:
  - name:        go-makefile-maker
    fromPackage: .
    installTo:   bin/

golang:
  autoupdateDependencies:
    enabled: true
    matchModule: ^github.com/(?:sapcc|sap-cloud-infrastructure)/
  setGoModVersion: true

golangciLint:
  createConfig: true
  reviveRules:
    - name: exported
      arguments:
        - checkPrivateReceivers
        - disableChecksOnConstants

githubWorkflow:
  ci:
    enabled: true
  global:
    defaultBranch: main # only defined here so that the "Run go-makefile-maker" Action knows it

nix:
  extraPackages:
    - renovate

renovate:
  enabled: true
  assignees:
    - SuperSandro2000
  customManagers:
    - customType: regex
      description: Update GitHub Actions in constants.go (major-only versions)
      managerFilePatterns:
        - internal/core/constants.go
      matchStrings:
        - '\w+\s*=\s*"(?<depName>[\w-]+/[\w-]+)@v(?<currentValue>\d+)"'
        - '\w+\s*=\s*"(?<depName>[\w-]+/[\w-]+/[\w-]+)@v(?<currentValue>\d+)"'
      datasourceTemplate: github-releases
      versioningTemplate: "regex:^v?(?<major>\\d+)$"
      extractVersionTemplate: "^v(?<version>\\d+)"
    - customType: regex
      description: Update GitHub Actions in constants.go (semver versions)
      managerFilePatterns:
        - internal/core/constants.go
      matchStrings:
        - '\w+\s*=\s*"(?<depName>[\w-]+/[\w-]+)@v(?<currentValue>\d+\.\d+\.\d+)"'
        - '\w+\s*=\s*"(?<depName>[\w-]+/[\w-]+/[\w-]+)@v(?<currentValue>\d+\.\d+\.\d+)"'
      datasourceTemplate: github-releases
      extractVersionTemplate: "^v(?<version>.*)$"

reuse:
  annotations:
    - paths:
        - internal/makefile/license-scan-overrides.jsonl.tmpl
        - internal/makefile/license-scan-rules.json
        - internal/reuse/go-licence-detector.tmpl
        - logo*.png
      SPDX-FileCopyrightText: 'SAP SE or an SAP affiliate company'
      SPDX-License-Identifier: Apache-2.0

verbatim: |
  run: build/go-makefile-maker
    ./build/go-makefile-maker
