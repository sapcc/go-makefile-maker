      depNameTemplate: docker/login-action
      datasourceTemplate: github-releases
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - '"docker/metadata-action@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
      depNameTemplate: docker/metadata-action
      datasourceTemplate: github-releases
