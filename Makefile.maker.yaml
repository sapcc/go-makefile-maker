      matchStrings:
        - '"golangci/golangci-lint-action@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
      depNameTemplate: golangci/golangci-lint-action
      datasourceTemplate: github-releases
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - '"goreleaser/goreleaser-action@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
      depNameTemplate: goreleaser/goreleaser-action
      datasourceTemplate: github-releases
      versioningTemplate: semver
    - customType: regex
      managerFilePatterns:
        - /^internal\/core\/constants\.go$/
      matchStrings:
        - '"fsfe/reuse-action@(?<currentDigest>[a-f0-9]+)\s+#\s+(?<currentValue>v\S+)"'
